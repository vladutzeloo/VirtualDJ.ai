name: android APK

# Wraps the Vite/React web build with Capacitor and produces a debug APK.
# Triggers:
#  - Manual dispatch (workflow_dispatch) — easiest way to grab a fresh APK
#  - Pushes to main / claude/** / android-** that touch the app or this workflow
#  - Tags vX.Y.Z-android — also publishes a draft GitHub Release with the APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
      - "android-**"
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "capacitor.config.ts"
      - ".github/workflows/android-apk.yml"
    tags:
      - "v*-android"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install web dependencies
        run: npm install --no-audit --no-fund

      - name: Install Capacitor (workflow-only, no lockfile churn)
        run: npm install --no-save --no-audit --no-fund @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6

      - name: Build web assets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Generate Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('capacitor.config.ts', 'package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK="$(find android/app/build/outputs/apk -name '*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "No APK found under android/app/build/outputs/apk" >&2
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtualdj-debug
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish draft release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-android')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: ${{ steps.apk.outputs.path }}
