name: android APK

# Wraps the Vite/React web build with Capacitor and produces a debug APK.
# Every successful run publishes a public GitHub Release so the APK can be
# downloaded directly on a phone (no GitHub login required).
# Triggers:
#  - Manual dispatch (workflow_dispatch) — easiest way to grab a fresh APK
#  - Pushes to main / claude/** / android-** that touch the app or this workflow
#  - Tags vX.Y.Z-android — uses the tag name for the release
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
      - "android-**"
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig.json"
      - "capacitor.config.ts"
      - ".github/workflows/android-apk.yml"
    tags:
      - "v*-android"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install web dependencies
        run: npm install --no-audit --no-fund

      - name: Install Capacitor (workflow-only, no lockfile churn)
        run: npm install --no-save --no-audit --no-fund @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6

      - name: Build web assets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Generate Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Stamp Android versionName/versionCode from package.json
        run: |
          VERSION_NAME="$(node -p "require('./package.json').version")"
          VERSION_CODE="$(node -p "const [a,b,c]=require('./package.json').version.split('.').map(Number); a*10000+b*100+(c||0)")"
          echo "Setting versionName=$VERSION_NAME versionCode=$VERSION_CODE"
          sed -i -E "s|versionName \"[^\"]*\"|versionName \"$VERSION_NAME\"|" android/app/build.gradle
          sed -i -E "s|versionCode [0-9]+|versionCode $VERSION_CODE|" android/app/build.gradle
          grep -E "versionName|versionCode" android/app/build.gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('capacitor.config.ts', 'package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK="$(find android/app/build/outputs/apk -name '*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "No APK found under android/app/build/outputs/apk" >&2
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtualdj-debug
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION_NAME="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF" == refs/tags/v*-android ]]; then
            TAG="${GITHUB_REF_NAME}"
            NAME="${GITHUB_REF_NAME}"
            PRERELEASE=false
          else
            TAG="android-v${VERSION_NAME}-${SHORT_SHA}-r${GITHUB_RUN_NUMBER}"
            NAME="Android v${VERSION_NAME} build ${SHORT_SHA} (run ${GITHUB_RUN_NUMBER})"
            PRERELEASE=true
          fi
          {
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "prerelease=$PRERELEASE"
            echo "short_sha=$SHORT_SHA"
            echo "version_name=$VERSION_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Stage APK with versioned filename
        id: release_apk
        run: |
          DEST="virtualdj-v${{ steps.meta.outputs.version_name }}-${{ steps.meta.outputs.short_sha }}-debug.apk"
          cp "${{ steps.apk.outputs.path }}" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.

            - Branch / ref: `${{ github.ref_name }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Install on your phone by opening the `.apk` asset URL below in the
            mobile browser (you may need to allow installs from unknown sources).
          files: ${{ steps.release_apk.outputs.path }}
          fail_on_unmatched_files: true
